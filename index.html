<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Atelier — Choose Your Style Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="home">
  <div class="home-mark">
    <div class="eyebrow">The Atelier</div>
    <h1>Grooming &amp; Style Guide</h1>
  </div>

  <div class="split">

    <a class="panel panel--male" href="men.html" aria-label="Open male grooming guide">
      <div class="panel-bg" style="background-image:url('https://images.unsplash.com/photo-1492447166138-50c3889fccb1?auto=format&fit=crop&w=1200&q=80');"></div>
      <div class="panel-tint"></div>
      <div class="panel-content">
        <div class="panel-index">01</div>
        <div class="panel-title">Men's<br>Edit</div>
        <p class="panel-desc">Hairstyles, sharp shirt &amp; trouser pairings, and the shoes to finish the look.</p>
        <span class="panel-cta">Enter guide
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </span>
      </div>
    </a>

    <a class="panel panel--female" href="female.html" aria-label="Open female grooming guide">
      <div class="panel-bg" style="background-image:url('https://images.unsplash.com/photo-1487412947147-5cebf100ffc2?auto=format&fit=crop&w=1200&q=80');"></div>
      <div class="panel-tint"></div>
      <div class="panel-content">
        <div class="panel-index">02</div>
        <div class="panel-title">Women's<br>Edit</div>
        <p class="panel-desc">Hairstyles, outfits, nail art and shoes — curated for every mood.</p>
        <span class="panel-cta">Enter guide
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </span>
      </div>
    </a>

    <div class="divider"></div>
    <div class="divider-badge">VS</div>
  </div>
</div>

</body>
</html>
